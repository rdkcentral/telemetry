name: Copilot Quality Checks

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to run quality checks on'
        required: false
        default: 'develop'
        type: string

permissions:
  contents: read

jobs:
  static-analysis:
    name: Static Analysis & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Pull test container image
        run: docker pull ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest
      
      - name: Start container
        run: |
          docker run -d --name native-platform -v ${{ github.workspace }}:/mnt/workspace ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest
      
      - name: Run static analysis
        run: |
          docker exec -i native-platform /bin/bash -c "
            cd /mnt/workspace && \
            cppcheck --enable=all \
                     --inconclusive \
                     --suppress=missingIncludeSystem \
                     --suppress=unmatchedSuppression \
                     --error-exitcode=0 \
                     --xml \
                     --xml-version=2 \
                     source/ 2> cppcheck-report.xml || true
          "
         
      - name: Upload static analysis results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-results
          path: cppcheck-report.xml
          retention-days: 7

  memory-safety:
    name: Memory Safety (Valgrind)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Pull test container image
        run: docker pull ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest
      
      - name: Start container
        run: |
          docker run -d --name native-platform -v ${{ github.workspace }}:/mnt/workspace ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest
      
      - name: Configure and build
        run: |
          docker exec -i native-platform /bin/bash -c "
            cd /mnt/workspace && \
            autoreconf -fi && \
            ./configure --enable-gtest && \
            make -j\$(nproc)
          "
      
      - name: Run tests
        run: |
          docker exec -i native-platform /bin/bash -c "
            cd /mnt/workspace && \
            make check || true
          "
      
      - name: Run memory leak tests
        continue-on-error: true
        run: |
          docker exec -i native-platform /bin/bash -c "
            cd /mnt/workspace && \
            if [ -d 'source/test' ]; then
              find source/test -type f -executable -name '*test*' 2>/dev/null | while read test_bin; do
                echo '=== Memory testing: \$test_bin ==='
                valgrind --leak-check=full \
                         --show-leak-kinds=all \
                         --track-origins=yes \
                         --error-exitcode=1 \
                         --xml=yes \
                         --xml-file=\"valgrind-\$(basename \$test_bin).xml\" \
                         \"\$test_bin\" 2>&1 | tee \"valgrind-\$(basename \$test_bin).log\" || true
              done
            fi
          "
      
      - name: Upload memory test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: memory-safety-results
          path: |
            valgrind-*.xml
            valgrind-*.log
          retention-days: 7

  thread-safety:
    name: Thread Safety (Helgrind)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Pull test container image
        run: docker pull ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest
      
      - name: Start container
        run: |
          docker run -d --name native-platform -v ${{ github.workspace }}:/mnt/workspace ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest
      
      - name: Configure and build
        run: |
          docker exec -i native-platform /bin/bash -c "
            cd /mnt/workspace && \
            autoreconf -fi && \
            ./configure --enable-gtest && \
            make -j\$(nproc)
          "
      
      - name: Run concurrency tests
        continue-on-error: true
        run: |
          docker exec -i native-platform /bin/bash -c "
            cd /mnt/workspace && \
            if [ -d 'source/test' ]; then
              find source/test -type f -executable -name '*test*' 2>/dev/null | while read test_bin; do
                echo '=== Concurrency testing: \$test_bin ==='
                valgrind --tool=helgrind \
                         --track-lockorders=yes \
                         --error-exitcode=1 \
                         --xml=yes \
                         --xml-file=\"helgrind-\$(basename \$test_bin).xml\" \
                         \"\$test_bin\" 2>&1 | tee \"helgrind-\$(basename \$test_bin).log\" || true
              done
            fi
          "
      
      - name: Upload thread safety results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: thread-safety-results
          path: |
            helgrind-*.xml
            helgrind-*.log
          retention-days: 7

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Pull test container image
        run: docker pull ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest
      
      - name: Start container
        run: |
          docker run -d --name native-platform -v ${{ github.workspace }}:/mnt/workspace ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest
      
      - name: Run autoreconf
        run: |
          docker exec -i native-platform /bin/bash -c "
            cd /mnt/workspace && \
            autoreconf -fi
          "
      
      - name: Configure with tests enabled
        run: |
          docker exec -i native-platform /bin/bash -c "
            cd /mnt/workspace && \
            ./configure --enable-gtest CFLAGS='-Wall -Wextra -Werror'
          "
      
      - name: Build with strict warnings
        run: |
          docker exec -i native-platform /bin/bash -c "
            cd /mnt/workspace && \
            make -j\$(nproc)
          "
      
      - name: Check build artifacts
        run: |
          docker exec -i native-platform /bin/bash -c "
            cd /mnt/workspace && \
            if [ -f 'telemetry2_0' ]; then
              echo '=== Telemetry Binary Info ==='
              ls -lh telemetry2_0
              file telemetry2_0
              size telemetry2_0
            else
              echo 'Telemetry binary not found, checking build output...'
              find . -name 'telemetry*' -type f -executable
            fi
          "
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            telemetry2_0
            **/*.so
            **/*.a
          retention-days: 7
